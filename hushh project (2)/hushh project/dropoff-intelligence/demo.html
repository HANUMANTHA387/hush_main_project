<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse AI Telemetry Demo</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 40px; background: #f8fafc; color: #1e293b; text-align: center; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 40px; rounded: 16px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); border-radius: 20px; }
        h1 { color: #4f46e5; margin-bottom: 8px; }
        p { color: #64748b; margin-bottom: 32px; }
        .button-group { display: flex; flex-direction: column; gap: 12px; }
        button { padding: 12px 24px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s; background: #4f46e5; color: white; }
        button:hover { background: #4338ca; transform: translateY(-1px); }
        button.secondary { background: #f1f5f9; color: #475569; }
        button.secondary:hover { background: #e2e8f0; }
        button.danger { background: #ef4444; }
        button.danger:hover { background: #dc2626; }
        .status { margin-top: 32px; font-size: 12px; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Pulse AI Sync Demo</h1>
        <p>Click the buttons below to trigger live events in the Pulse AI Dashboard.</p>
        
        <div class="button-group">
            <button id="btn_profile_start">Start Profile Setup</button>
            <button id="btn_avatar_upload" class="secondary">Upload Avatar</button>
            <button id="btn_back_friction" class="danger">Trigger Back Button (Friction)</button>
            <button id="btn_success_finish">Finish Ingestion</button>
        </div>

        <div class="status">
            Telemetry Session: <span id="session_display">Initializing...</span>
        </div>
    </div>

    <!-- Load the telemetry script -->
    <script src="pulse-telemetry.js"></script>
    <script>
        // Display session ID
        setTimeout(() => {
            document.getElementById('session_display').innerText = localStorage.getItem('pulse_session_id');
        }, 500);

        // Simulate a back button press for the danger button
        document.getElementById('btn_back_friction').addEventListener('click', () => {
             window.history.pushState({page: 1}, "title 1", "?friction=true");
             window.history.back();
        });
    </script>
</body>
</html>
